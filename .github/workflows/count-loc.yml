name: Count Lines of Code

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  count:
    runs-on: ubuntu-latest

    permissions:
      contents: write # ← THIS is what was missing

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v3

      - name: Install cloc and jq
        run: sudo apt-get install -y cloc jq

      - name: Clone all repos and count LOC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: divakarvelagacherla
        run: |
          mkdir all-repos
          cd all-repos

          repos=$(curl -s "https://api.github.com/users/$GITHUB_USERNAME/repos?per_page=100" \
            -H "Authorization: token $GITHUB_TOKEN" \
            | jq -r '.[].name')

          for repo in $repos; do
            git clone --depth=1 \
              "https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_USERNAME/$repo.git" \
              || echo "Skipping $repo"
          done

          cd ..
          cloc all-repos --json --out=stats.json

      - name: Commit and push stats.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add stats.json
          git commit -m "Update LOC stats" || echo "No changes"
          git push
